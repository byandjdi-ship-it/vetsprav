<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ВетСправочник">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💊</text></svg>">
    <title>ВетСправочник</title>
    <style>
        :root {
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --text: #1d1d1f;
            --secondary: #86868b;
            --accent: #007aff;
            --border: #e5e5ea;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            --radius: 16px;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
            --tab-height: 60px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            padding-bottom: calc(var(--tab-height) + var(--safe-bottom) + 8px);
        }
        .header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(245, 245, 247, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 16px 16px 12px;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }
        .header.scrolled {
            border-bottom-color: var(--border);
        }
        .search-wrapper {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }
        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: var(--secondary);
            pointer-events: none;
        }
        #searchInput {
            width: 100%;
            padding: 12px 16px 12px 40px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            background: var(--card-bg);
            color: var(--text);
            outline: none;
            transition: all 0.2s;
            -webkit-appearance: none;
        }
        #searchInput:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.12);
        }
        #searchInput::placeholder {
            color: #c7c7cc;
        }
        .clear-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--secondary);
            color: white;
            border: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            font-size: 12px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .clear-btn.visible {
            display: flex;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 8px 16px 16px;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            border: 1px solid var(--border);
        }
        .card:active {
            transform: scale(0.985);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
        }
        .card-summary {
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .card-name {
            font-weight: 600;
            font-size: 17px;
            color: var(--text);
        }
        .card-tag {
            font-size: 13px;
            color: var(--secondary);
            background: #f2f2f7;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .chevron {
            font-size: 14px;
            color: #c7c7cc;
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .card.open .chevron {
            transform: rotate(180deg);
        }
        .card-details {
            display: none;
            padding: 0 16px 16px;
            border-top: 1px solid var(--border);
            margin-top: 0;
            padding-top: 12px;
            font-size: 14px;
            color: #3a3a3c;
            animation: fadeIn 0.2s ease;
        }
        .card.open .card-details {
            display: block;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-4px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .detail-row {
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .detail-label {
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--secondary);
        }
        .detail-value {
            font-size: 14px;
            color: var(--text);
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--secondary);
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .empty-state p {
            font-size: 15px;
        }
        .badge-count {
            font-size: 13px;
            color: var(--secondary);
            text-align: center;
            margin-bottom: 8px;
        }

        /* Нижняя панель вкладок */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 20;
            display: flex;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding-bottom: var(--safe-bottom);
            height: calc(var(--tab-height) + var(--safe-bottom));
        }
        .tab-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            border: none;
            background: transparent;
            font-size: 11px;
            font-weight: 500;
            color: var(--secondary);
            cursor: pointer;
            transition: color 0.2s;
            -webkit-tap-highlight-color: transparent;
            font-family: inherit;
        }
        .tab-btn .tab-emoji {
            font-size: 24px;
        }
        .tab-btn.active {
            color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="header" id="header">
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Поиск..." autocomplete="off">
            <button class="clear-btn" id="clearBtn" aria-label="Очистить">✕</button>
        </div>
    </div>

    <div class="container">
        <!-- Вкладка Препараты -->
        <div class="tab-content active" id="tab-drugs">
            <p class="badge-count" id="drugCount"></p>
            <ul class="list" id="drugList"></ul>
            <div class="empty-state" id="emptyDrugs" style="display:none;">
                <div class="icon">💊</div>
                <p>Препараты не найдены</p>
            </div>
        </div>

        <!-- Вкладка Болезни -->
        <div class="tab-content" id="tab-diseases">
            <p class="badge-count" id="diseaseCount"></p>
            <ul class="list" id="diseaseList"></ul>
            <div class="empty-state" id="emptyDiseases" style="display:none;">
                <div class="icon">🩺</div>
                <p>Болезни не найдены</p>
            </div>
        </div>
    </div>

    <!-- Нижняя панель -->
    <div class="tab-bar">
        <button class="tab-btn active" data-tab="drugs">
            <span class="tab-emoji">💊</span>
            Препараты
        </button>
        <button class="tab-btn" data-tab="diseases">
            <span class="tab-emoji">🩺</span>
            Болезни
        </button>
    </div>

    <script>
        (function() {
            // ============================================================
            //  БАЗА ПРЕПАРАТОВ
            //  Формат: каждый препарат начинается с "===" на новой строке
            // ============================================================
            var drugRaw = "";
            drugRaw += "===\n";
            drugRaw += "Название: Амоксициллин\n";
            drugRaw += "Группа: Антибиотик\n";
            drugRaw +=
                "Фармдействие: Полусинтетический антибиотик широкого спектра действия группы пенициллинов. Применяется для лечения бактериальных инфекций. Обладает бактерицидным эффектом, разрушая клеточную стенку бактерий. Активен в отношении грамположительных и грамотрицательных микроорганизмов.\n";
            drugRaw +=
                "Когда применяется: Инфекции дыхательных путей, инфекции ЖКТ, инфекции мочеполовой системы, раневые и послеоперационные инфекции. При пиодермии дозировка может быть увеличена до 20 мг/кг.\n";
            drugRaw += "Форма выпуска: Таблетки 5 мг, 10 мг; Раствор 1200 мг\n";
            drugRaw += "Кошка: 10 мг/кг 2 раза в день\n";
            drugRaw += "Собака: 15 мг/кг 2 раза в день\n";
            drugRaw += "Другие животные: Кролики - 5 мг/кг 1 раз в день. Грызуны - не рекомендуется.\n";
            drugRaw +=
                "Противопоказания: Аллергия на пенициллины, почечная недостаточность, инфекционный мононуклеоз.\n";
            drugRaw += "Побочка: Рвота, диарея, аллергические реакции (сыпь, отёк), нарушение микрофлоры ЖКТ.\n";
            drugRaw +=
                "Примечания: Курс 5-7 дней. Контроль функции почек при длительном применении. Возможна перекрёстная аллергия с цефалоспоринами.\n";

            drugRaw += "===\n";
            drugRaw += "Название: Мелоксикам\n";
            drugRaw += "Группа: НПВС\n";
            drugRaw +=
                "Фармдействие: Нестероидное противовоспалительное средство из группы оксикамов. Селективно ингибирует ЦОГ-2, за счёт чего оказывает выраженное противовоспалительное, анальгезирующее и жаропонижающее действие. Меньше влияет на ЦОГ-1, что снижает риск желудочно-кишечных побочных эффектов по сравнению с неселективными НПВС.\n";
            drugRaw +=
                "Когда применяется: Остеоартрит, послеоперационная боль, травмы, воспалительные заболевания суставов. При онкологии костей - для паллиативного обезболивания.\n";
            drugRaw += "Форма выпуска: Таблетки 1 мг, 2.5 мг; Суспензия для орального применения 0.5 мг/мл; Раствор для инъекций 5 мг/мл\n";
            drugRaw += "Кошка: 0.05 мг/кг 1 раз в день (начальная доза 0.1 мг/кг). Максимальный курс для кошек - 5 дней.\n";
            drugRaw += "Собака: 0.2 мг/кг в первый день, затем 0.1 мг/кг 1 раз в день.\n";
            drugRaw +=
                "Другие животные: Кролики - 0.1-0.2 мг/кг 1 раз в день (с осторожностью). Птицы - 0.1-0.2 мг/кг (данные ограничены).\n";
            drugRaw +=
                "Противопоказания: Почечная недостаточность, язва желудка и двенадцатиперстной кишки, геморрагический синдром, беременность, лактация, котята/щенки младше 6 недель. Не комбинировать с кортикостероидами и другими НПВС.\n";
            drugRaw +=
                "Побочка: Желудочно-кишечное кровотечение (скрытая кровь в кале), рвота, диарея, нефротоксичность, повышение печёночных ферментов.\n";
            drugRaw +=
                "Примечания: Обязателен контроль функции почек (креатинин, мочевина) до и во время лечения. Всегда давать после еды. При первых признаках рвоты или чёрного стула - немедленно отменить и обратиться в клинику.\n";

            drugRaw += "===\n";
            drugRaw += "Название: Имидокарб\n";
            drugRaw += "Группа: Противопротозойное\n";
            drugRaw +=
                "Фармдействие: Противопротозойный препарат из группы карбанилидных производных. Оказывает прямое повреждающее действие на пироплазмы (Babesia spp.) и другие кровепаразиты. Механизм действия связан с ингибированием образования инозитола, необходимого для жизнедеятельности паразита. Обладает пролонгированным действием.\n";
            drugRaw +=
                "Когда применяется: Бабезиоз (пироплазмоз) собак и кошек. Профилактика бабезиоза в эндемичных районах.\n";
            drugRaw += "Форма выпуска: Раствор для инъекций 120 мг/мл\n";
            drugRaw += "Кошка: 2-4 мг/кг однократно, при необходимости повтор через 14 дней.\n";
            drugRaw += "Собака: 4-6 мг/кг однократно. При тяжёлом течении возможно повторное введение через 14 дней.\n";
            drugRaw += "Другие животные: Лошади - 2-4 мг/кг (для лечения пироплазмоза). КРС - 2.5 мг/кг.\n";
            drugRaw +=
                "Противопоказания: Повышенная чувствительность к препарату. Не рекомендуется вводить одновременно с холинергическими средствами (фосфорорганические инсектициды). С осторожностью при печёночной недостаточности.\n";
            drugRaw +=
                "Побочка: Брадикардия, гиперсаливация, тремор, слезотечение, учащённое мочеиспускание (холинергический эффект - обычно купируется атропином). Болезненность в месте инъекции.\n";
            drugRaw +=
                "Примечания: Обязательна премедикация атропином (0.02-0.04 мг/кг) за 15 минут до введения! Вводить строго подкожно или внутримышечно. Наблюдать за животным 30 минут после инъекции. Антидот при передозировке - атропин.\n";

            drugRaw += "===\n";
            drugRaw += "Название: Фенбендазол\n";
            drugRaw += "Группа: Антигельминтик\n";
            drugRaw +=
                "Фармдействие: Антигельминтный препарат широкого спектра из группы бензимидазолов. Ингибирует полимеризацию тубулина, что приводит к нарушению клеточного строения и энергетического обмена гельминтов. Эффективен против нематод, цестод и некоторых трематод. Действует на личиночные и половозрелые формы.\n";
            drugRaw +=
                "Когда применяется: Нематодозы (токсокароз, анкилостомоз), цестодозы, лямблиоз (гиардиаз) у собак и кошек. При лямблиозе курс 5-7 дней.\n";
            drugRaw += "Форма выпуска: Таблетки 250 мг, 500 мг; Суспензия 100 мг/мл; Гранулят 222 мг/г\n";
            drugRaw += "Кошка: 50 мг/кг 3 дня подряд при нематодозах; 50 мг/кг 5-7 дней при лямблиозе.\n";
            drugRaw += "Собака: 50 мг/кг 3 дня подряд; при лямблиозе 50 мг/кг 5-7 дней.\n";
            drugRaw +=
                "Другие животные: Кролики и грызуны - 20-50 мг/кг. Птицы - 20-50 мг/кг 3-5 дней. Рептилии - 50 мг/кг, повторить через 2 недели.\n";
            drugRaw +=
                "Противопоказания: Повышенная чувствительность к бензимидазолам. Не применять одновременно с препаратами, угнетающими костный мозг.\n";
            drugRaw +=
                "Побочка: Редко - рвота, диарея (обычно при сильной инвазии из-за массовой гибели паразитов). Аллергические реакции.\n";
            drugRaw +=
                "Примечания: Хорошо переносится даже щенками и котятами с 2-недельного возраста. При лямблиозе обязателен контрольный анализ через 2 недели. Рекомендуется повторить курс через 21 день для разрыва цикла развития паразитов.\n";

            drugRaw += "===\n";
            drugRaw += "Название: Преднизолон\n";
            drugRaw += "Группа: Кортикостероид\n";
            drugRaw +=
                "Фармдействие: Синтетический глюкокортикостероид с выраженным противовоспалительным, противоаллергическим и иммуносупрессивным действием. Тормозит миграцию лейкоцитов в очаг воспаления, стабилизирует мембраны лизосом, снижает синтез простагландинов и лейкотриенов. Обладает также минералокортикоидной активностью.\n";
            drugRaw +=
                "Когда применяется: Аллергические дерматиты, бронхиальная астма кошек, аутоиммунные заболевания (иммуноопосредованная гемолитическая анемия, тромбоцитопения), воспалительные заболевания кишечника (ВЗК), неотложные состояния (отёк мозга, анафилактический шок).\n";
            drugRaw += "Форма выпуска: Таблетки 5 мг, 20 мг; Раствор для инъекций 30 мг/мл\n";
            drugRaw +=
                "Кошка: Противовоспалительная - 1-2 мг/кг; Иммуносупрессивная - 4 мг/кг. Обязательно постепенное снижение дозы (титрование) после достижения эффекта.\n";
            drugRaw +=
                "Собака: Противовоспалительная - 0.5-1 мг/кг; Иммуносупрессивная - 2-4 мг/кг. Всегда стремиться к минимальной эффективной дозе и режиму через день.\n";
            drugRaw +=
                "Другие животные: Кролики и грызуны - применять с крайней осторожностью (высокий риск иммуносупрессии и гибели). Птицы - 0.5-1 мг/кг.\n";
            drugRaw +=
                "Противопоказания: Сахарный диабет, системные микозы, язва ЖКТ, остеопороз, беременность. Не комбинировать с НПВС (риск язвы и почечной недостаточности). С осторожностью при сердечной недостаточности.\n";
            drugRaw +=
                "Побочка: Полиурия/полидипсия, повышение аппетита, язва ЖКТ, панкреатит, ятрогенный гиперадренокортицизм (синдром Кушинга), алопеция, кальциноз кожи, мышечная слабость, предрасположенность к инфекциям.\n";
            drugRaw +=
                "Примечания: Никогда не отменять резко - только постепенное снижение дозы в течение недель/месяцев! Контроль АЛТ, ЩФ, глюкозы крови. Минимальный курс для подавления собственной оси гипофиз-надпочечники - 7 дней.\n";

            drugRaw += "===\n";
            drugRaw += "Название: Габапентин\n";
            drugRaw += "Группа: Анальгетик / Противосудорожное\n";
            drugRaw +=
                "Фармдействие: Структурный аналог ГАМК, хотя не действует напрямую на ГАМК-рецепторы. Связывается с альфа-2-дельта субъединицей потенциал-зависимых кальциевых каналов, снижая высвобождение возбуждающих нейротрансмиттеров. Оказывает обезболивающее (особенно при невропатической боли) и противосудорожное действие.\n";
            drugRaw +=
                "Когда применяется: Хроническая невропатическая боль (остеоартрит, онкология, травмы спинного мозга), послеоперационная боль (как компонент мультимодальной аналгезии), тревожность и фобии у кошек перед визитом в клинику, идиопатический цистит кошек, противосудорожная терапия.\n";
            drugRaw += "Форма выпуска: Капсулы 100 мг, 300 мг, 400 мг\n";
            drugRaw += "Кошка: 5-10 мг/кг 2-3 раза в день. При тревожности перед визитом - 20-50 мг/кг однократно за 1.5-2 часа.\n";
            drugRaw += "Собака: 10-20 мг/кг 2-3 раза в день. При невропатической боли - до 30 мг/кг.\n";
            drugRaw +=
