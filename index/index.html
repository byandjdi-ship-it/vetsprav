<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ВетСправочник">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💊</text></svg>">
    <title>ВетСправочник</title>
    <style>
        :root {
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --text: #1d1d1f;
            --secondary: #86868b;
            --accent: #007aff;
            --border: #e5e5ea;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --radius: 16px;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            padding-bottom: calc(50px + var(--safe-bottom));
        }
        .header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(245,245,247,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 16px 16px 12px;
            border-bottom: 1px solid var(--border);
        }
        .search-wrapper {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }
        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: var(--secondary);
            pointer-events: none;
        }
        #searchInput {
            width: 100%;
            padding: 12px 16px 12px 40px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            background: var(--card-bg);
            color: var(--text);
            outline: none;
            transition: all 0.2s;
            -webkit-appearance: none;
        }
        #searchInput:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,122,255,0.12);
        }
        #searchInput::placeholder {
            color: #c7c7cc;
        }
        .clear-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--secondary);
            color: white;
            border: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            font-size: 12px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .clear-btn.visible {
            display: flex;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 8px 16px 16px;
        }
        .drug-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .drug-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            border: 1px solid var(--border);
        }
        .drug-card:active {
            transform: scale(0.985);
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .drug-summary {
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .drug-name {
            font-weight: 600;
            font-size: 17px;
            color: var(--text);
        }
        .drug-group {
            font-size: 13px;
            color: var(--secondary);
            background: #f2f2f7;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .chevron {
            font-size: 14px;
            color: #c7c7cc;
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .drug-card.open .chevron {
            transform: rotate(180deg);
        }
        .drug-details {
            display: none;
            padding: 0 16px 16px;
            border-top: 1px solid var(--border);
            margin-top: 0;
            padding-top: 12px;
            font-size: 14px;
            color: #3a3a3c;
            animation: fadeIn 0.2s ease;
        }
        .drug-card.open .drug-details {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .detail-row {
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .detail-label {
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--secondary);
        }
        .detail-value {
            font-size: 14px;
            color: var(--text);
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--secondary);
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .empty-state p {
            font-size: 15px;
        }
        .badge-count {
            font-size: 13px;
            color: var(--secondary);
            text-align: center;
            margin-bottom: 8px;
        }

        /* Таб-бар */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            z-index: 20;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }
        .tab-btn {
            flex: 1;
            padding: 10px 16px 8px;
            border: none;
            background: transparent;
            font-size: 14px;
            font-weight: 500;
            color: var(--secondary);
            cursor: pointer;
            transition: color 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .tab-btn.active {
            color: var(--accent);
        }
        .tab-icon {
            font-size: 22px;
        }
        .tab-label {
            font-size: 11px;
        }

        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* Болезни - доп стили */
        .disease-card .drug-summary {
            flex-wrap: wrap;
        }
        .disease-main-drugs {
            font-size: 12px;
            color: var(--accent);
            background: rgba(0,122,255,0.08);
            padding: 2px 8px;
            border-radius: 10px;
            white-space: nowrap;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="header" id="header">
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Поиск..." autocomplete="off">
            <button class="clear-btn" id="clearBtn" aria-label="Очистить">✕</button>
        </div>
    </div>

    <div class="container">
        <!-- Вкладка Препараты -->
        <div class="tab-content active" id="tab-drugs">
            <p class="badge-count" id="drugCount"></p>
            <ul class="drug-list" id="drugList"></ul>
            <div class="empty-state" id="drugEmptyState" style="display:none;">
                <div class="icon">💊</div>
                <p>Препараты не найдены</p>
                <p style="font-size:13px; margin-top:4px;">Попробуйте изменить запрос</p>
            </div>
        </div>

        <!-- Вкладка Болезни -->
        <div class="tab-content" id="tab-diseases">
            <p class="badge-count" id="diseaseCount"></p>
            <ul class="drug-list" id="diseaseList"></ul>
            <div class="empty-state" id="diseaseEmptyState" style="display:none;">
                <div class="icon">🩺</div>
                <p>Болезни не найдены</p>
                <p style="font-size:13px; margin-top:4px;">Попробуйте изменить запрос</p>
            </div>
        </div>
    </div>

    <!-- Таб-бар -->
    <div class="tab-bar">
        <button class="tab-btn active" id="btnDrugs" onclick="switchTab('drugs')">
            <span class="tab-icon">💊</span>
            <span class="tab-label">Препараты</span>
        </button>
        <button class="tab-btn" id="btnDiseases" onclick="switchTab('diseases')">
            <span class="tab-icon">🩺</span>
            <span class="tab-label">Болезни</span>
        </button>
    </div>

    <script>
        (function() {
            // ============================================================
            //  БАЗА ПРЕПАРАТОВ
            // ============================================================
            var drugsRaw = "";
            drugsRaw += "===drug\n";
            drugsRaw += "Название: Амоксициллин\n";
            drugsRaw += "Группа: Антибиотик\n";
            drugsRaw += "Фармдействие: Полусинтетический антибиотик широкого спектра действия группы пенициллинов. Применяется для лечения бактериальных инфекций. Обладает бактерицидным эффектом, разрушая клеточную стенку бактерий. Активен в отношении грамположительных и грамотрицательных микроорганизмов.\n";
            drugsRaw += "Когда применяется: Инфекции дыхательных путей, инфекции ЖКТ, инфекции мочеполовой системы, раневые и послеоперационные инфекции. При пиодермии дозировка может быть увеличена до 20 мг/кг.\n";
            drugsRaw += "Форма выпуска: Таблетки 125 мг, 250 мг; 500 мг \n";
            drugsRaw += "Кошка: - мг/кг 2 раза в день\n";
            drugsRaw += "Собака: - мг/кг 2 раза в день\n";
            drugsRaw += "Другие животные: Кролики - - мг/кг 1 раз в день. Грызуны - не рекомендуется.\n";
            drugsRaw += "Противопоказания: Аллергия на пенициллины, почечная недостаточность, инфекционный мононуклеоз.\n";
            drugsRaw += "Побочка: Рвота, диарея, аллергические реакции (сыпь, отёк), нарушение микрофлоры ЖКТ.\n";
            drugsRaw += "Примечания: Курс 5-7 дней. Контроль функции почек при длительном применении. Возможна перекрёстная аллергия с цефалоспоринами.\n";

            drugsRaw += "===drug\n";
            drugsRaw += "Название: Мелоксикам\n";
            drugsRaw += "Группа: НПВС\n";
            drugsRaw += "Фармдействие: Нестероидное противовоспалительное средство из группы оксикамов. Селективно ингибирует ЦОГ-2, за счёт чего оказывает выраженное противовоспалительное, анальгезирующее и жаропонижающее действие. Меньше влияет на ЦОГ-1, что снижает риск желудочно-кишечных побочных эффектов по сравнению с неселективными НПВС.\n";
            drugsRaw += "Когда применяется: Остеоартрит, послеоперационная боль, травмы, воспалительные заболевания суставов. При онкологии костей - для паллиативного обезболивания.\n";
            drugsRaw += "Форма выпуска: Таблетки 7.5 мг, 15 мг; Суспензия для орального применения 0.5\1.5 мг/мл; Раствор для инъекций 10 мг/мл\n";
            drugsRaw += "Кошка: 0.05 мг/кг 1 раз в день (начальная доза 0.1 мг/кг). Максимальный курс для кошек - 5 дней.\n";
            drugsRaw += "Собака: 0.2 мг/кг в первый день, затем 0.1 мг/кг 1 раз в день.\n";
            drugsRaw += "Другие животные: Кролики - 0.3-0.6 мг/кг 1 раз в день (с осторожностью). Птицы - 0.5-1.0 мг/кг.\n";
            drugsRaw += "Противопоказания: Почечная недостаточность, язва желудка и двенадцатиперстной кишки, геморрагический синдром, беременность, лактация, котята/щенки младше 6 недель. Не комбинировать с кортикостероидами и другими НПВС.\n";
            drugsRaw += "Побочка: Желудочно-кишечное кровотечение (скрытая кровь в кале), рвота, диарея, нефротоксичность, повышение печёночных ферментов.\n";
            drugsRaw += "Примечания: Обязателен контроль функции почек (креатинин, мочевина) до и во время лечения. Всегда давать после еды. При первых признаках рвоты или чёрного стула - немедленно отменить и обратиться в клинику.\n";

            drugsRaw += "===drug\n";
            drugsRaw += "Название: Имидокарб (Пиро-стоп)\n";
            drugsRaw += "Группа: Противопротозойное\n";
            drugsRaw += "Фармдействие: Противопротозойный препарат из группы карбанилидных производных. Оказывает прямое повреждающее действие на пироплазмы (Babesia spp.) и другие кровепаразиты. Механизм действия связан с ингибированием образования инозитола, необходимого для жизнедеятельности паразита. Обладает пролонгированным действием.\n";
            drugsRaw += "Когда применяется: Бабезиоз (пироплазмоз) собак и кошек. Профилактика бабезиоза в эндемичных районах.\n";
            drugsRaw += "Форма выпуска: Раствор для инъекций 120 мг/мл\n";
            drugsRaw += "Кошка: 2.5 мг/кг однократно, при необходимости повтор через 14 дней.\n";
            drugsRaw += "Собака: 4-6.6 мг/кг в/м, п/к однократно. При тяжёлом течении возможно повторное введение через 14 дней.\n";
            drugsRaw += "Другие животные: Альтернативная доза: 5мг/кг 2-х кратно с интервалом 14 д.\n";
            drugsRaw += "Противопоказания: Не рекомендуется вводить одновременно с холинергическими средствами (фосфорорганические инсектициды). При печёночной недостаточности.\n";
            drugsRaw += "Побочка: Брадикардия, гиперсаливация, тремор, слезотечение, учащённое мочеиспускание (холинергический эффект - обычно купируется атропином). Болезненность в месте инъекции.\n";
            drugsRaw += "Примечания: Обязательна премедикация атропином (0.02-0.04 мг/кг) за 15 минут до введения! Вводить строго подкожно или внутримышечно. Наблюдать за животным 30 минут после инъекции. Антидот при передозировке - атропин.\n";

            drugsRaw += "===drug\n";
            drugsRaw += "Название: Фенбендазол?\n";
            drugsRaw += "Группа: Антигельминтик\n";
            drugsRaw += "Фармдействие: Антигельминтный препарат широкого спектра из группы бензимидазолов. Ингибирует полимеризацию тубулина, что приводит к нарушению клеточного строения и энергетического обмена гельминтов. Эффективен против нематод, цестод и некоторых трематод. Действует на личиночные и половозрелые формы.\n";
            drugsRaw += "Когда применяется: Нематодозы (токсокароз, анкилостомоз), цестодозы, лямблиоз (гиардиаз) у собак и кошек. При лямблиозе курс 5-7 дней.\n";
            drugsRaw += "Форма выпуска: Таблетки 250 мг, 500 мг; Суспензия 100 мг/мл; Гранулят 222 мг/г\n";
            drugsRaw += "Кошка: 50 мг/кг 3 дня подряд при нематодозах; 50 мг/кг 5-7 дней при лямблиозе.\n";
            drugsRaw += "Собака: 50 мг/кг 3 дня подряд; при лямблиозе 50 мг/кг 5-7 дней.\n";
            drugsRaw += "Другие животные: Кролики и грызуны - 20-50 мг/кг. Птицы - 20-50 мг/кг 3-5 дней. Рептилии - 50 мг/кг, повторить через 2 недели.\n";
            drugsRaw += "Противопоказания: Не применять одновременно с препаратами, угнетающими костный мозг.\n";
            drugsRaw += "Побочка: Редко - рвота, диарея (обычно при сильной инвазии из-за массовой гибели паразитов). Аллергические реакции.\n";
            drugsRaw += "Примечания: Хорошо переносится даже щенками и котятами с 2-недельного возраста. При лямблиозе обязателен контрольный анализ через 2 недели. Рекомендуется повторить курс через 21 день для разрыва цикла развития паразитов.\n";

            drugsRaw += "===drug\n";
            drugsRaw += "Название: Энтерол\n";
            drugsRaw += "Группа: Противодиарейное\n";
            drugsRaw += "Фармдействие: Пробиотический препарат сахаромицеты буларди\n";
            drugsRaw += "Когда применяется: Дисбактериоз, острая инф., вир., бакт. диарея, диарея вызванная приемом А/б, СРК, энтероколит\n";
            drugsRaw += "Форма выпуска: Капсулы 250 мг, Порошок для приготовл сусп. 250мг/пакетик.\n";
            drugsRaw += "Кошка: 50-250 мг/кг 2 раза в день.\n";
            drugsRaw += "Собака: 50-250 мг/кг 2 раза в день.\n";
            drugsRaw += "Другие животные: Кролики и грызуны - - мг/кг. Птицы - - мг/кг.\n";
            drugsRaw += "Противопоказания: Иммунодефицит, ЦВК (риск фунгемии).\n";
            drugsRaw += "Побочка: Метеоризм, запор, аллергическая реакция.\n";
            drugsRaw += "Примечания: -\n";
 
            drugsRaw += "===drug\n";
            drugsRaw += "Название: Преднизолон\n";
            drugsRaw += "Группа: Кортикостероид\n";
            drugsRaw += "Фармдействие: Синтетический глюкокортикостероид с выраженным противовоспалительным, противоаллергическим и иммуносупрессивным действием. Тормозит миграцию лейкоцитов в очаг воспаления, стабилизирует мембраны лизосом, снижает синтез простагландинов и лейкотриенов. Обладает также минералокортикоидной активностью.\n";
            drugsRaw += "Когда применяется: Аллергические дерматиты, бронхиальная астма кошек, аутоиммунные заболевания (иммуноопосредованная гемолитическая анемия, тромбоцитопения), воспалительные заболевания кишечника (ВЗК), неотложные состояния (отёк мозга, анафилактический шок).\n";
            drugsRaw += "Форма выпуска: Таблетки 5 мг; Раствор для инъекций 30 мг/мл\n";
            drugsRaw += "Кошка: Противовоспалительная - 0,5-1 мг/кг 1р/д; Иммуносупрессивная - 1-2 мг/кг. Обязательно постепенное снижение дозы (0.3-0.5 мг/кг) после достижения эффекта.\n";
            drugsRaw += "Собака: Противовоспалительная - 0.5-1 мг/кг; Иммуносупрессивная - 2-6 мг/кг. Всегда стремиться к минимальной эффективной дозе и режиму через день.\n";
            drugsRaw += "Другие животные: Кролики и грызуны - применять с крайней осторожностью (высокий риск иммуносупрессии и гибели). Птицы - 0.5-1 мг/кг.\n";
            drugsRaw += "Противопоказания: Сахарный диабет, системные микозы, язва ЖКТ, остеопороз, беременность. Не комбинировать с НПВС (риск язвы и почечной недостаточности). С осторожностью при сердечной недостаточности.\n";
            drugsRaw += "Побочка: Полиурия/полидипсия, повышение аппетита, язва ЖКТ, панкреатит, ятрогенный гиперадренокортицизм (синдром Кушинга), алопеция, кальциноз кожи, мышечная слабость, предрасположенность к инфекциям.\n";
            drugsRaw += "Примечания: Никогда не отменять резко - только постепенное снижение дозы в течение недель/месяцев! Контроль АЛТ, ЩФ, глюкозы крови. Минимальный курс для подавления собственной оси гипофиз-надпочечники - 7 дней.\n";

            drugsRaw += "===drug\n";
            drugsRaw += "Название: Габапентин\n";
            drugsRaw += "Группа: Анальгетик / Противосудорожное\n";
            drugsRaw += "Фармдействие: Структурный аналог ГАМК. Связывается с альфа-2-дельта субъединицей потенциал-зависимых кальциевых каналов, снижая высвобождение возбуждающих нейротрансмиттеров. Оказывает обезболивающее (особенно при невропатической боли) и противосудорожное действие.\n";
            drugsRaw += "Когда применяется: Хроническая невропатическая боль (остеоартрит, онкология, травмы спинного мозга), послеоперационная боль, тревожность и фобии у кошек перед визитом в клинику, идиопатический цистит кошек, противосудорожная терапия.\n";
            drugsRaw += "Форма выпуска: Капсулы 100 мг, 300 мг; табл. 50,200 мг (габитабс); сусп.50 мг (Мирапентин).\n";
            drugsRaw += "Кошка: 5-10 мг/кг 2-3 раза в день. При тревожности перед визитом - 20-30 мг/кг однократно за 1.5-2 часа, нейропатич. боль 5-10 мг/кг 2р/д.\n";
            drugsRaw += "Собака: 10-20 мг/кг 2-3 раза в день. При невропатической боли - до 5-15 мг/кг 2 р/д (max 40 mg).\n";
            drugsRaw += "Другие животные: Кролики и грызуны - 10-25 мг/кг (данные ограничены). Птицы - 10-25 мг/кг 2 раза в день.\n";
            drugsRaw += "Противопоказания: С осторожностью при почечной недостаточности (снижать дозу пропорционально СКФ).\n";
            drugsRaw += "Побочка: Седация (сонливость), атаксия (пошатывание) - обычно проходят через 1-3 дня регулярного приёма. Повышение аппетита. Редко - рвота, диарея.\n";
            drugsRaw += "Примечания: Начинать с низкой дозы и титровать вверх для минимизации седации. При отмене снижать постепенно в течение 7-14 дней. Терапевтический эффект при невропатической боли может развиваться 1-2 недели.\n";

            drugsRaw += "===drug\n";
            drugsRaw += "Название: Маропитант\n";
            drugsRaw += "Группа: Противорвотное\n";
            drugsRaw += "Фармдействие: Антагонист нейрокининовых рецепторов (NK-1). Блокирует связывание субстанции P в рвотном центре продолговатого мозга и в хеморецепторной триггерной зоне. Эффективно подавляет рвоту центрального и периферического генеза.\n";
            drugsRaw += "Когда применяется: Рвота любой этиологии (гастрит, панкреатит, инородное тело, химиотерапия, укачивание в транспорте). Профилактика рвоты перед химиотерапией.\n";
            drugsRaw += "Форма выпуска: Таблетки 16 мг, 24 мг, 60 мг; Раствор для инъекций 10 мг/мл\n";
            drugsRaw += "Кошка: 1 мг/кг 1 раз в день.\n";
            drugsRaw += "Собака: 2 мг/кг 1 раз в день. При укачивании - 8 мг/кг однократно за 1 час до поездки.\n";
            drugsRaw += "Другие животные: Кролики - - мг/кг . Хорьки - - мг/кг.\n";
            drugsRaw += "Противопоказания: Не рекомендуется животным с подозрением на полную обструкцию ЖКТ.\n";
            drugsRaw += "Побочка: Редко - диарея, вялость, снижение аппетита. Болезненность при подкожном введении.\n";
            drugsRaw += "Примечания: Не маскирует причину рвоты - обязательна диагностика. Можно комбинировать с ондансетроном. Таблетки давать за 1 час до еды.\n";

            // ============================================================
            //  БАЗА БОЛЕЗНЕЙ
            // ============================================================
            var diseasesRaw = "";
            diseasesRaw += "===disease\n";
            diseasesRaw += "Название: Пироплазмоз (Бабезиоз)\n";
            diseasesRaw += "Симптомы: Вялость, отказ от еды, высокая температура (до 41°C), бледность или желтушность слизистых, тёмная моча (гемоглобинурия), учащённое дыхание и пульс.\n";
            diseasesRaw += "Основные препараты: Имидокарб, диминазен ацетурат. Обязательна премедикация атропином!\n";
            diseasesRaw += "Доп терапия: Инфузионная терапия (физ.р-р, стер.), декс 0.3 мг\кг?, гепатопротекторы, антиоксиданты, переливание крови при тяжёлой анемии.\n";
            diseasesRaw += "Диф диагнозы: Лептоспироз, ИОГА/АИГА, отравление гемолитическими ядами, инфекционный гепатит.\n";
            diseasesRaw += "Диагностика: Микроскопия мазка крови (окраска по Романовскому-Гимзе), ПЦР, серология (ИФА), клинический и биохимический анализ крови.\n";

            diseasesRaw += "===disease\n";
            diseasesRaw += "Название: Панкреатит\n";
            diseasesRaw += "Симптомы: Рвота, боль в животе (поза моления), отказ от еды, вялость, диарея, возможно повышение температуры. У кошек часто протекает скрыто, только вялость и снижение аппетита.\n";
            diseasesRaw += "Основные препараты: Маропитант (противорвотное), инфузионная терапия, обезболивание (трамадол, габапентин).\n";
            diseasesRaw += "Доп терапия: Голодная диета 24-48 часов, затем лечебное питание (низкожировое), пробиотики, антиоксиданты (витамин E, C). При необходимости - парентеральное питание.\n";
            diseasesRaw += "Диф диагнозы: Инородное тело ЖКТ, гастроэнтерит, холецистит, почечная недостаточность, диабетический кетоацидоз.\n";
            diseasesRaw += "Диагностика: УЗИ брюшной полости, биохимия крови (амилаза, липаза, панкр. липаза), клинический анализ крови, рентген (для исключения инородного тела).\n";

            diseasesRaw += "===disease\n";
            diseasesRaw += "Название: Хроническая почечная недостаточность (ХПН)\n";
            diseasesRaw += "Симптомы: Полиурия/полидипсия, снижение аппетита, потеря веса, рвота, язвы во рту, уремический запах, бледность слизистых, гипертензия.\n";
            diseasesRaw += "Основные препараты: Ингибиторы АПФ=↓АД(эналаприл, беназеприл), фосфат-биндеры (ипакитине, нефроланвет), кальцитриол.\n";
            diseasesRaw += "Доп терапия: Почечная диета (низкий фосфор, умеренный белок), контроль водного баланса, эритропоэтин при анемии, антигипертензивные препараты.\n";
            diseasesRaw += "Диф диагнозы: Острая почечная недостаточность, сахарный диабет, гипертиреоз (кошки), пиометра, пиелонефрит, неоплазия почек.\n";
            diseasesRaw += "Диагностика: Биохимия крови (креатинин, мочевина, фосфор, калий), анализ мочи (удельный вес, белок), УЗИ почек, измерение артериального давления.\n";

            diseasesRaw += "===disease\n";
            diseasesRaw += "Название: Атопический дерматит\n";
            diseasesRaw += "Симптомы: Сильный зуд (особенно на лапах, морде, в ушах), покраснение кожи, алопеция от расчёсывания, хронические отиты, вторичная пиодермия.\n";
            diseasesRaw += "Основные препараты: Апоквел (оклацитиниб), Цитопоинт (локиветмаб), преднизолон (короткими курсами), циклоспорин.\n";
            diseasesRaw += "Доп терапия: Гипоаллергенная диета, эссенциальные жирные кислоты, местная терапия (шампуни, спреи), контроль вторичных инфекций.\n";
            diseasesRaw += "Диф диагнозы: Пищевая аллергия, паразитарные дерматиты (блошиный, саркоптоз), контактный дерматит, малассезиозный дерматит.\n";
            diseasesRaw += "Диагностика: Исключающая диета (8-12 недель), внутрикожные аллергопробы, серология (IgE), контроль паразитов, цитология кожи.\n";

            // ============================================================
            //  ПАРСИНГ
            // ============================================================
            function parseData(raw, separator) {
                var items = [];
                var blocks = raw.split(separator);
                for (var i = 0; i < blocks.length; i++) {
                    var block = blocks[i].trim();
                    if (!block) continue;
                    var item = {};
                    var lines = block.split("\n");
                    for (var j = 0; j < lines.length; j++) {
                        var line = lines[j].trim();
                        if (!line) continue;
                        var colonIndex = line.indexOf(":");
                        if (colonIndex === -1) continue;
                        var key = line.substring(0, colonIndex).trim();
                        var value = line.substring(colonIndex + 1).trim();
                        if (key && value) {
                            item[key] = value;
                        }
                    }
                    if (item["Название"]) {
                        items.push(item);
                    }
                }
                return items;
            }

            var drugs = parseData(drugsRaw, "===drug");
            var diseases = parseData(diseasesRaw, "===disease");

            // ============================================================
            //  DOM
            // ============================================================
            var searchInput = document.getElementById("searchInput");
            var clearBtn = document.getElementById("clearBtn");
            var drugList = document.getElementById("drugList");
            var drugCount = document.getElementById("drugCount");
            var drugEmpty = document.getElementById("drugEmptyState");
            var diseaseList = document.getElementById("diseaseList");
            var diseaseCount = document.getElementById("diseaseCount");
            var diseaseEmpty = document.getElementById("diseaseEmptyState");
            var header = document.getElementById("header");

            var currentTab = "drugs";

            // ============================================================
            //  ОТРИСОВКА
            // ============================================================
            function renderItems(list, items, emptyEl, countEl, type) {
                list.innerHTML = "";
                var filter = searchInput.value.toLowerCase().trim();
                var filtered = items;

                if (filter) {
                    filtered = items.filter(function(item) {
                        for (var key in item) {
                            if (item[key] && item[key].toLowerCase().indexOf(filter) !== -1) {
                                return true;
                            }
                        }
                        return false;
                    });
                }

                filtered.sort(function(a, b) {
                    return (a["Название"] || "").localeCompare(b["Название"] || "", "ru");
                });

                countEl.textContent = "Найдено: " + filtered.length;

                if (filtered.length === 0) {
                    emptyEl.style.display = "block";
                    list.style.display = "none";
                } else {
                    emptyEl.style.display = "none";
                    list.style.display = "flex";
                }

                filtered.forEach(function(item) {
                    var li = document.createElement("li");
                    li.className = "drug-card" + (type === "disease" ? " disease-card" : "");

                    var subtitleHtml = "";
                    if (type === "drug") {
                        subtitleHtml = '<span class="drug-group">' + escapeHtml(item["Группа"] || "—") + '</span>';
                    } else {
                        subtitleHtml = '<span class="disease-main-drugs">' + escapeHtml(truncateText(item["Основные препараты"] || "", 40)) + '</span>';
                    }

                    li.innerHTML = '<div class="drug-summary">' +
                        '<span class="drug-name">' + escapeHtml(item["Название"] || "") + '</span>' +
                        subtitleHtml +
                        '<span class="chevron">▼</span>' +
                        '</div>' +
                        '<div class="drug-details">' + renderDetails(item, type) + '</div>';

                    var summary = li.querySelector(".drug-summary");
                    summary.addEventListener("click", function() {
                        var allCards = document.querySelectorAll(".drug-card.open");
                        for (var k = 0; k < allCards.length; k++) {
                            if (allCards[k] !== li) allCards[k].classList.remove("open");
                        }
                        li.classList.toggle("open");
                    });

                    list.appendChild(li);
                });
            }

            function renderDetails(item, type) {
                var fields;
                if (type === "drug") {
                    fields = [
                        { label: "💊 Фармакологическое действие", key: "Фармдействие" },
                        { label: "📋 Когда применяется", key: "Когда применяется" },
                        { label: "📦 Форма выпуска", key: "Форма выпуска" },
                        { label: "🐱 Дозировка для кошек", key: "Кошка" },
                        { label: "🐶 Дозировка для собак", key: "Собака" },
                        { label: "🐾 Дозировка для других животных", key: "Другие животные" },
                        { label: "⚠️ Противопоказания", key: "Противопоказания" },
                        { label: "🩺 Побочные эффекты", key: "Побочка" },
                        { label: "📝 Особые указания", key: "Примечания" }
                    ];
                } else {
                    fields = [
                        { label: "🔬 Симптомы", key: "Симптомы" },
                        { label: "💉 Основные препараты", key: "Основные препараты" },
                        { label: "🩹 Дополнительная терапия", key: "Доп терапия" },
                        { label: "🔄 Дифференциальные диагнозы", key: "Диф диагнозы" },
                        { label: "🔍 Диагностика", key: "Диагностика" }
                    ];
                }

                var html = "";
                fields.forEach(function(f) {
                    var value = item[f.key];
                    if (value && value.trim() && value.trim() !== "-") {
                        html += '<div class="detail-row">' +
                            '<span class="detail-label">' + f.label + '</span>' +
                            '<span class="detail-value">' + escapeHtml(value) + '</span>' +
                            '</div>';
                    }
                });
                return html || '<p style="color:#86868b;">Нет дополнительной информации</p>';
            }

            function escapeHtml(text) {
                var div = document.createElement("div");
                div.textContent = text;
                return div.innerHTML;
            }

            function truncateText(text, maxLen) {
                if (text.length <= maxLen) return text;
                return text.substring(0, maxLen) + "...";
            }

            function refreshCurrentTab() {
                if (currentTab === "drugs") {
                    renderItems(drugList, drugs, drugEmpty, drugCount, "drug");
                } else {
                    renderItems(diseaseList, diseases, diseaseEmpty, diseaseCount, "disease");
                }
            }

            // ============================================================
            //  ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
            // ============================================================
            window.switchTab = function(tab) {
                currentTab = tab;
                document.getElementById("btnDrugs").classList.toggle("active", tab === "drugs");
                document.getElementById("btnDiseases").classList.toggle("active", tab === "diseases");
                document.getElementById("tab-drugs").classList.toggle("active", tab === "drugs");
                document.getElementById("tab-diseases").classList.toggle("active", tab === "diseases");
                refreshCurrentTab();
                window.scrollTo(0, 0);
            };

            // ============================================================
            //  ПОИСК
            // ============================================================
            searchInput.addEventListener("input", function() {
                if (searchInput.value.trim()) {
                    clearBtn.classList.add("visible");
                } else {
                    clearBtn.classList.remove("visible");
                }
                refreshCurrentTab();
            });

            clearBtn.addEventListener("click", function() {
                searchInput.value = "";
                clearBtn.classList.remove("visible");
                refreshCurrentTab();
                searchInput.focus();
            });

            // ============================================================
            //  ИНИЦИАЛИЗАЦИЯ
            // ============================================================
            renderItems(drugList, drugs, drugEmpty, drugCount, "drug");
            renderItems(diseaseList, diseases, diseaseEmpty, diseaseCount, "disease");

            console.log("✅ ВетСправочник загружен. Препаратов: " + drugs.length + ", болезней: " + diseases.length);

        })();
    </script>
</body>
</html>
