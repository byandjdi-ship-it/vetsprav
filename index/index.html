<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ВетСправочник">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💊</text></svg>">
    <title>ВетСправочник</title>
    <style>
        :root {
            --bg: #f5f5f7;
            --card-bg: #ffffff;
            --text: #1d1d1f;
            --secondary: #86868b;
            --accent: #007aff;
            --border: #e5e5ea;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --radius: 16px;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            padding-bottom: var(--safe-bottom);
        }
        .header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: rgba(245,245,247,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 16px 16px 12px;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }
        .header.scrolled {
            border-bottom-color: var(--border);
        }
        .search-wrapper {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }
        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: var(--secondary);
            pointer-events: none;
        }
        #searchInput {
            width: 100%;
            padding: 12px 16px 12px 40px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            background: var(--card-bg);
            color: var(--text);
            outline: none;
            transition: all 0.2s;
            -webkit-appearance: none;
        }
        #searchInput:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,122,255,0.12);
        }
        #searchInput::placeholder {
            color: #c7c7cc;
        }
        .clear-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--secondary);
            color: white;
            border: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            font-size: 12px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .clear-btn.visible {
            display: flex;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 8px 16px 16px;
        }
        .drug-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .drug-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            border: 1px solid var(--border);
        }
        .drug-card:active {
            transform: scale(0.985);
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .drug-summary {
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .drug-name {
            font-weight: 600;
            font-size: 17px;
            color: var(--text);
        }
        .drug-group {
            font-size: 13px;
            color: var(--secondary);
            background: #f2f2f7;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .chevron {
            font-size: 14px;
            color: #c7c7cc;
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .drug-card.open .chevron {
            transform: rotate(180deg);
        }
        .drug-details {
            display: none;
            padding: 0 16px 16px;
            border-top: 1px solid var(--border);
            margin-top: 0;
            padding-top: 12px;
            font-size: 14px;
            color: #3a3a3c;
            animation: fadeIn 0.2s ease;
        }
        .drug-card.open .drug-details {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .detail-row {
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .detail-label {
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--secondary);
        }
        .detail-value {
            font-size: 14px;
            color: var(--text);
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--secondary);
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .empty-state p {
            font-size: 15px;
        }
        .badge-count {
            font-size: 13px;
            color: var(--secondary);
            text-align: center;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <div class="header" id="header">
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Поиск препарата..." autocomplete="off">
            <button class="clear-btn" id="clearBtn" aria-label="Очистить">✕</button>
        </div>
    </div>

    <div class="container">
        <p class="badge-count" id="drugCount"></p>
        <ul class="drug-list" id="drugList"></ul>
        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="icon">💊</div>
            <p>Препараты не найдены</p>
            <p style="font-size:13px; margin-top:4px;">Попробуйте изменить запрос</p>
        </div>
    </div>

    <script>
        (function() {
            // ============================================================
            //  СЮДА ВЫ ДОБАВЛЯЕТЕ СВОИ ПРЕПАРАТЫ
            //  Каждый препарат начинается с "===" на новой строке
            //  Порядок полей внутри блока не важен
            // ============================================================
            var rawData = "";
            rawData += "===\n";
            rawData += "Название: Амоксициллин\n";
            rawData += "Группа: Антибиотик\n";
            rawData += "Фармдействие: Полусинтетический антибиотик широкого спектра действия группы пенициллинов. Применяется для лечения бактериальных инфекций. Обладает бактерицидным эффектом, разрушая клеточную стенку бактерий. Активен в отношении грамположительных и грамотрицательных микроорганизмов.\n";
            rawData += "Когда применяется: Инфекции дыхательных путей, инфекции ЖКТ, инфекции мочеполовой системы, раневые и послеоперационные инфекции. При пиодермии дозировка может быть увеличена до 20 мг/кг.\n";
            rawData += "Форма выпуска: Таблетки 5 мг, 10 мг; Раствор 1200 мг\n";
            rawData += "Кошка: 10 мг/кг 2 раза в день\n";
            rawData += "Собака: 15 мг/кг 2 раза в день\n";
            rawData += "Другие животные: Кролики - 5 мг/кг 1 раз в день. Грызуны - не рекомендуется.\n";
            rawData += "Противопоказания: Аллергия на пенициллины, почечная недостаточность, инфекционный мононуклеоз.\n";
            rawData += "Побочка: Рвота, диарея, аллергические реакции (сыпь, отёк), нарушение микрофлоры ЖКТ.\n";
            rawData += "Примечания: Курс 5-7 дней. Контроль функции почек при длительном применении. Возможна перекрёстная аллергия с цефалоспоринами.\n";

            rawData += "===\n";
            rawData += "Название: Мелоксикам\n";
            rawData += "Группа: НПВС\n";
            rawData += "Фармдействие: Нестероидное противовоспалительное средство из группы оксикамов. Селективно ингибирует ЦОГ-2, за счёт чего оказывает выраженное противовоспалительное, анальгезирующее и жаропонижающее действие. Меньше влияет на ЦОГ-1, что снижает риск желудочно-кишечных побочных эффектов по сравнению с неселективными НПВС.\n";
            rawData += "Когда применяется: Остеоартрит, послеоперационная боль, травмы, воспалительные заболевания суставов. При онкологии костей - для паллиативного обезболивания.\n";
            rawData += "Форма выпуска: Таблетки 1 мг, 2.5 мг; Суспензия для орального применения 0.5 мг/мл; Раствор для инъекций 5 мг/мл\n";
            rawData += "Кошка: 0.05 мг/кг 1 раз в день (начальная доза 0.1 мг/кг). Максимальный курс для кошек - 5 дней.\n";
            rawData += "Собака: 0.2 мг/кг в первый день, затем 0.1 мг/кг 1 раз в день.\n";
            rawData += "Другие животные: Кролики - 0.1-0.2 мг/кг 1 раз в день (с осторожностью). Птицы - 0.1-0.2 мг/кг (данные ограничены).\n";
            rawData += "Противопоказания: Почечная недостаточность, язва желудка и двенадцатиперстной кишки, геморрагический синдром, беременность, лактация, котята/щенки младше 6 недель. Не комбинировать с кортикостероидами и другими НПВС.\n";
            rawData += "Побочка: Желудочно-кишечное кровотечение (скрытая кровь в кале), рвота, диарея, нефротоксичность, повышение печёночных ферментов.\n";
            rawData += "Примечания: Обязателен контроль функции почек (креатинин, мочевина) до и во время лечения. Всегда давать после еды. При первых признаках рвоты или чёрного стула - немедленно отменить и обратиться в клинику.\n";

            rawData += "===\n";
            rawData += "Название: Имидокарб\n";
            rawData += "Группа: Противопротозойное\n";
            rawData += "Фармдействие: Противопротозойный препарат из группы карбанилидных производных. Оказывает прямое повреждающее действие на пироплазмы (Babesia spp.) и другие кровепаразиты. Механизм действия связан с ингибированием образования инозитола, необходимого для жизнедеятельности паразита. Обладает пролонгированным действием.\n";
            rawData += "Когда применяется: Бабезиоз (пироплазмоз) собак и кошек. Профилактика бабезиоза в эндемичных районах.\n";
            rawData += "Форма выпуска: Раствор для инъекций 120 мг/мл\n";
            rawData += "Кошка: 2-4 мг/кг однократно, при необходимости повтор через 14 дней.\n";
            rawData += "Собака: 4-6 мг/кг однократно. При тяжёлом течении возможно повторное введение через 14 дней.\n";
            rawData += "Другие животные: Лошади - 2-4 мг/кг (для лечения пироплазмоза). КРС - 2.5 мг/кг.\n";
            rawData += "Противопоказания: Повышенная чувствительность к препарату. Не рекомендуется вводить одновременно с холинергическими средствами (фосфорорганические инсектициды). С осторожностью при печёночной недостаточности.\n";
            rawData += "Побочка: Брадикардия, гиперсаливация, тремор, слезотечение, учащённое мочеиспускание (холинергический эффект - обычно купируется атропином). Болезненность в месте инъекции.\n";
            rawData += "Примечания: Обязательна премедикация атропином (0.02-0.04 мг/кг) за 15 минут до введения! Вводить строго подкожно или внутримышечно. Наблюдать за животным 30 минут после инъекции. Антидот при передозировке - атропин.\n";

            rawData += "===\n";
            rawData += "Название: Фенбендазол\n";
            rawData += "Группа: Антигельминтик\n";
            rawData += "Фармдействие: Антигельминтный препарат широкого спектра из группы бензимидазолов. Ингибирует полимеризацию тубулина, что приводит к нарушению клеточного строения и энергетического обмена гельминтов. Эффективен против нематод, цестод и некоторых трематод. Действует на личиночные и половозрелые формы.\n";
            rawData += "Когда применяется: Нематодозы (токсокароз, анкилостомоз), цестодозы, лямблиоз (гиардиаз) у собак и кошек. При лямблиозе курс 5-7 дней.\n";
            rawData += "Форма выпуска: Таблетки 250 мг, 500 мг; Суспензия 100 мг/мл; Гранулят 222 мг/г\n";
            rawData += "Кошка: 50 мг/кг 3 дня подряд при нематодозах; 50 мг/кг 5-7 дней при лямблиозе.\n";
            rawData += "Собака: 50 мг/кг 3 дня подряд; при лямблиозе 50 мг/кг 5-7 дней.\n";
            rawData += "Другие животные: Кролики и грызуны - 20-50 мг/кг. Птицы - 20-50 мг/кг 3-5 дней. Рептилии - 50 мг/кг, повторить через 2 недели.\n";
            rawData += "Противопоказания: Повышенная чувствительность к бензимидазолам. Не применять одновременно с препаратами, угнетающими костный мозг.\n";
            rawData += "Побочка: Редко - рвота, диарея (обычно при сильной инвазии из-за массовой гибели паразитов). Аллергические реакции.\n";
            rawData += "Примечания: Хорошо переносится даже щенками и котятами с 2-недельного возраста. При лямблиозе обязателен контрольный анализ через 2 недели. Рекомендуется повторить курс через 21 день для разрыва цикла развития паразитов.\n";

            rawData += "===\n";
            rawData += "Название: Преднизолон\n";
            rawData += "Группа: Кортикостероид\n";
            rawData += "Фармдействие: Синтетический глюкокортикостероид с выраженным противовоспалительным, противоаллергическим и иммуносупрессивным действием. Тормозит миграцию лейкоцитов в очаг воспаления, стабилизирует мембраны лизосом, снижает синтез простагландинов и лейкотриенов. Обладает также минералокортикоидной активностью.\n";
            rawData += "Когда применяется: Аллергические дерматиты, бронхиальная астма кошек, аутоиммунные заболевания (иммуноопосредованная гемолитическая анемия, тромбоцитопения), воспалительные заболевания кишечника (ВЗК), неотложные состояния (отёк мозга, анафилактический шок).\n";
            rawData += "Форма выпуска: Таблетки 5 мг, 20 мг; Раствор для инъекций 30 мг/мл\n";
            rawData += "Кошка: Противовоспалительная - 1-2 мг/кг; Иммуносупрессивная - 4 мг/кг. Обязательно постепенное снижение дозы (титрование) после достижения эффекта.\n";
            rawData += "Собака: Противовоспалительная - 0.5-1 мг/кг; Иммуносупрессивная - 2-4 мг/кг. Всегда стремиться к минимальной эффективной дозе и режиму через день.\n";
            rawData += "Другие животные: Кролики и грызуны - применять с крайней осторожностью (высокий риск иммуносупрессии и гибели). Птицы - 0.5-1 мг/кг.\n";
            rawData += "Противопоказания: Сахарный диабет, системные микозы, язва ЖКТ, остеопороз, беременность. Не комбинировать с НПВС (риск язвы и почечной недостаточности). С осторожностью при сердечной недостаточности.\n";
            rawData += "Побочка: Полиурия/полидипсия, повышение аппетита, язва ЖКТ, панкреатит, ятрогенный гиперадренокортицизм (синдром Кушинга), алопеция, кальциноз кожи, мышечная слабость, предрасположенность к инфекциям.\n";
            rawData += "Примечания: Никогда не отменять резко - только постепенное снижение дозы в течение недель/месяцев! Контроль АЛТ, ЩФ, глюкозы крови. Минимальный курс для подавления собственной оси гипофиз-надпочечники - 7 дней.\n";

            rawData += "===\n";
            rawData += "Название: Габапентин\n";
            rawData += "Группа: Анальгетик / Противосудорожное\n";
            rawData += "Фармдействие: Структурный аналог ГАМК, хотя не действует напрямую на ГАМК-рецепторы. Связывается с альфа-2-дельта субъединицей потенциал-зависимых кальциевых каналов, снижая высвобождение возбуждающих нейротрансмиттеров. Оказывает обезболивающее (особенно при невропатической боли) и противосудорожное действие.\n";
            rawData += "Когда применяется: Хроническая невропатическая боль (остеоартрит, онкология, травмы спинного мозга), послеоперационная боль (как компонент мультимодальной аналгезии), тревожность и фобии у кошек перед визитом в клинику, идиопатический цистит кошек, противосудорожная терапия.\n";
            rawData += "Форма выпуска: Капсулы 100 мг, 300 мг, 400 мг\n";
            rawData += "Кошка: 5-10 мг/кг 2-3 раза в день. При тревожности перед визитом - 20-50 мг/кг однократно за 1.5-2 часа.\n";
            rawData += "Собака: 10-20 мг/кг 2-3 раза в день. При невропатической боли - до 30 мг/кг.\n";
            rawData += "Другие животные: Кролики и грызуны - 10-25 мг/кг (данные ограничены). Птицы - 10-25 мг/кг 2 раза в день.\n";
            rawData += "Противопоказания: Повышенная чувствительность. С осторожностью при почечной недостаточности (снижать дозу пропорционально СКФ).\n";
            rawData += "Побочка: Седация (сонливость), атаксия (пошатывание) - обычно проходят через 1-3 дня регулярного приёма. Повышение аппетита. Редко - рвота, диарея.\n";
            rawData += "Примечания: Начинать с низкой дозы и титровать вверх для минимизации седации. При отмене снижать постепенно в течение 7-14 дней для избежания синдрома отмены. Терапевтический эффект при невропатической боли может развиваться 1-2 недели.\n";

            rawData += "===\n";
            rawData += "Название: Маропитант\n";
            rawData += "Группа: Противорвотное\n";
            rawData += "Фармдействие: Антагонист нейрокининовых рецепторов (NK-1). Блокирует связывание субстанции P в рвотном центре продолговатого мозга и в хеморецепторной триггерной зоне. Эффективно подавляет рвоту центрального и периферического генеза, включая рвоту, вызванную химиотерапией, укачиванием, а также при панкреатите.\n";
            rawData += "Когда применяется: Рвота любой этиологии (гастрит, панкреатит, инородное тело, химиотерапия, укачивание в транспорте). Профилактика рвоты перед химиотерапией.\n";
            rawData += "Форма выпуска: Таблетки 16 мг, 24 мг, 60 мг; Раствор для инъекций 10 мг/мл\n";
            rawData += "Кошка: 1 мг/кг 1 раз в день (вне инструкции, но широко применяется в практике).\n";
            rawData += "Собака: 2 мг/кг 1 раз в день. При укачивании - 8 мг/кг однократно за 1 час до поездки.\n";
            rawData += "Другие животные: Кролики - 1-2 мг/кг (ограниченные данные). Хорьки - 1 мг/кг.\n";
            rawData += "Противопоказания: Повышенная чувствительность. Не рекомендуется животным с подозрением на полную обструкцию ЖКТ (маскирует клиническую картину).\n";
            rawData += "Побочка: Редко - диарея, вялость, снижение аппетита. Болезненность при подкожном введении инъекционной формы (рекомендуется вводить охлаждённым и медленно).\n";
            rawData += "Примечания: Не маскирует причину рвоты - обязательна диагностика основного заболевания. Можно комбинировать с ондансетроном при тяжёлой рвоте. Таблетки давать за 1 час до еды для лучшего всасывания.\n";

            rawData += "===\n";
            rawData += "Название: Трамвай-остановка\n";
            rawData += "Группа: Тестовый\n";
            rawData += "Фармдействие: Это тестовый препарат для проверки поиска.\n";
            rawData += "Когда применяется: Тестирование.\n";
            rawData += "Форма выпуска: -\n";
            rawData += "Кошка: -\n";
            rawData += "Собака: -\n";
            rawData += "Другие животные: -\n";
            rawData += "Противопоказания: -\n";
            rawData += "Побочка: -\n";
            rawData += "Примечания: Проверьте, находится ли этот препарат через поиск трамвай или остановка.\n";

            // ============================================================
            //  ПАРСИНГ ДАННЫХ
            // ============================================================
            function parseDrugData(raw) {
                var drugs = [];
                var blocks = raw.split("===");
                for (var i = 0; i < blocks.length; i++) {
                    var block = blocks[i].trim();
                    if (!block) continue;
                    var drug = {};
                    var lines = block.split("\n");
                    for (var j = 0; j < lines.length; j++) {
                        var line = lines[j].trim();
                        if (!line) continue;
                        var colonIndex = line.indexOf(":");
                        if (colonIndex === -1) continue;
                        var key = line.substring(0, colonIndex).trim();
                        var value = line.substring(colonIndex + 1).trim();
                        if (key && value) {
                            drug[key] = value;
                        }
                    }
                    if (drug["Название"]) {
                        drugs.push(drug);
                    }
                }
                return drugs;
            }

            var drugs = parseDrugData(rawData);

            // ============================================================
            //  DOM-ЭЛЕМЕНТЫ
            // ============================================================
            var drugList = document.getElementById("drugList");
            var searchInput = document.getElementById("searchInput");
            var clearBtn = document.getElementById("clearBtn");
            var emptyState = document.getElementById("emptyState");
            var drugCount = document.getElementById("drugCount");
            var header = document.getElementById("header");

            // ============================================================
            //  ОТРИСОВКА
            // ============================================================
            function renderDrugs(filterText) {
                drugList.innerHTML = "";
                var filter = (filterText || "").toLowerCase().trim();
                var filtered = drugs;

                if (filter) {
                    filtered = drugs.filter(function(d) {
                        for (var key in d) {
                            if (d[key] && d[key].toLowerCase().indexOf(filter) !== -1) {
                                return true;
                            }
                        }
                        return false;
                    });
                }

                filtered.sort(function(a, b) {
                    return (a["Название"] || "").localeCompare(b["Название"] || "", "ru");
                });

                drugCount.textContent = "Найдено препаратов: " + filtered.length;

                if (filtered.length === 0) {
                    emptyState.style.display = "block";
                    drugList.style.display = "none";
                } else {
                    emptyState.style.display = "none";
                    drugList.style.display = "flex";
                }

                filtered.forEach(function(drug) {
                    var li = document.createElement("li");
                    li.className = "drug-card";
                    li.innerHTML = '<div class="drug-summary">' +
                        '<span class="drug-name">' + escapeHtml(drug["Название"] || "") + '</span>' +
                        '<span class="drug-group">' + escapeHtml(drug["Группа"] || "—") + '</span>' +
                        '<span class="chevron">▼</span>' +
                        '</div>' +
                        '<div class="drug-details">' + renderDetails(drug) + '</div>';

                    var summary = li.querySelector(".drug-summary");
                    summary.addEventListener("click", function() {
                        var openCards = document.querySelectorAll(".drug-card.open");
                        for (var k = 0; k < openCards.length; k++) {
                            if (openCards[k] !== li) openCards[k].classList.remove("open");
                        }
                        li.classList.toggle("open");
                    });

                    drugList.appendChild(li);
                });
            }

            function renderDetails(drug) {
                var fields = [
                    { label: "💊 Фармакологическое действие", key: "Фармдействие" },
                    { label: "📋 Когда применяется", key: "Когда применяется" },
                    { label: "📦 Форма выпуска", key: "Форма выпуска" },
                    { label: "🐱 Дозировка для кошек", key: "Кошка" },
                    { label: "🐶 Дозировка для собак", key: "Собака" },
                    { label: "🐾 Дозировка для других животных", key: "Другие животные" },
                    { label: "⚠️ Противопоказания", key: "Противопоказания" },
                    { label: "🩺 Побочные эффекты", key: "Побочка" },
                    { label: "📝 Особые указания", key: "Примечания" }
                ];

                var html = "";
                fields.forEach(function(f) {
                    var value = drug[f.key];
                    if (value && value.trim() && value.trim() !== "-") {
                        html += '<div class="detail-row">' +
                            '<span class="detail-label">' + f.label + '</span>' +
                            '<span class="detail-value">' + escapeHtml(value) + '</span>' +
                            '</div>';
                    }
                });
                return html || '<p style="color:#86868b;">Нет дополнительной информации</p>';
            }

            function escapeHtml(text) {
                var div = document.createElement("div");
                div.textContent = text;
                return div.innerHTML;
            }

            // ============================================================
            //  ОБРАБОТЧИКИ
            // ============================================================
            searchInput.addEventListener("input", function() {
                var val = searchInput.value;
                if (val.trim()) {
                    clearBtn.classList.add("visible");
                } else {
                    clearBtn.classList.remove("visible");
                }
                renderDrugs(val);
            });

            clearBtn.addEventListener("click", function() {
                searchInput.value = "";
                clearBtn.classList.remove("visible");
                renderDrugs("");
                searchInput.focus();
            });

            window.addEventListener("scroll", function() {
                if (window.scrollY > 5) {
                    header.classList.add("scrolled");
                } else {
                    header.classList.remove("scrolled");
                }
            });

            // ============================================================
            //  ПЕРВИЧНАЯ ОТРИСОВКА
            // ============================================================
            renderDrugs("");

            console.log("✅ Ветеринарный справочник загружен. Препаратов в базе: " + drugs.length);
            console.log("📱 Чтобы установить как приложение: Откройте в Safari → Поделиться → На экран Домой");
            console.log("✏️ Чтобы добавить препараты: отредактируйте секцию rawData в файле");

        })();
    </script>
</body>
</html>
